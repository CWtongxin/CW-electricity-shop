<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 云商店</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/CWtongxin/CW-electricity-shop@main/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-top">
                <a href="index.html" class="logo">
                    <span class="logo-icon">☁️</span>
                    <span>云商店</span>
                </a>
                
                <div class="search-bar">
                    <input type="text" class="search-input" placeholder="搜索云服务器、存储、数据库等产品..." id="searchInput">
                    <button class="search-btn" onclick="handleSearch()">🔍</button>
                </div>
                
                <div class="nav-user">
                    <div class="nav-item" onclick="showLoginModal()">
                        <span class="nav-item-icon">👤</span>
                        <span id="userText">登录/注册</span>
                    </div>
                    <div class="nav-item" style="background-color: var(--bg-light);">
                        <span class="nav-item-icon">🛒</span>
                        <span>购物车</span>
                        <span class="cart-count" id="cartCount">0</span>
                    </div>
                </div>
            </div>
            
            <div class="navbar-categories">
                <ul class="categories-list">
                    <li class="category-item"><a href="list.html?category=ecs">云服务器</a></li>
                    <li class="category-item"><a href="list.html?category=storage">云存储</a></li>
                    <li class="category-item"><a href="list.html?category=database">云数据库</a></li>
                    <li class="category-item"><a href="list.html?category=security">云安全</a></li>
                    <li class="category-item"><a href="list.html?category=network">网络服务</a></li>
                    <li class="category-item"><a href="list.html?category=bigdata">大数据</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container section">
        <h2 class="section-title">🛒 我的购物车</h2>
        
        <!-- 购物车为空的状态 -->
        <div id="emptyCart" style="display: none; text-align: center; padding: 60px 0;">
            <div style="font-size: 80px; color: var(--text-light); margin-bottom: 20px;">🛒</div>
            <p style="font-size: 18px; color: var(--text-secondary); margin-bottom: 30px;">您的购物车还是空的</p>
            <button class="btn btn-primary" onclick="location.href='index.html'">去逛逛</button>
        </div>

        <!-- 购物车有商品的状态 -->
        <div id="cartContent" style="display: none;">
            <!-- 购物车表头 -->
            <div class="cart-header">
                <input type="checkbox" class="cart-checkbox" id="selectAll" onchange="toggleSelectAll()">
                <span>商品信息</span>
                <span>单价</span>
                <span>数量</span>
                <span>小计</span>
                <span>操作</span>
            </div>

            <!-- 购物车列表 -->
            <div id="cartItems">
                <!-- 购物车商品项将通过 JavaScript 动态加载 -->
            </div>

            <!-- 购物车底部 -->
            <div class="cart-footer">
                <div class="cart-actions">
                    <input type="checkbox" class="cart-checkbox" id="batchDeleteCheck" style="width: auto;">
                    <label for="batchDeleteCheck" style="margin-left: 5px; cursor: pointer;">已选</label>
                    <button class="btn btn-outline" onclick="batchDelete()" style="margin-left: 10px;">删除选中</button>
                    <button class="btn btn-outline" onclick="clearCart()">清空购物车</button>
                </div>
                
                <div class="cart-summary">
                    <div class="cart-summary-text">已选 <span id="selectedCount" style="color: var(--primary-color); font-weight: 500;">0</span> 件商品</div>
                    <div style="display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px;">
                        <span style="color: var(--text-secondary);">合计：</span>
                        <span class="cart-total-price" id="cartTotalPrice">¥0.00</span>
                    </div>
                    <button class="btn btn-danger" onclick="checkout()" style="padding: 12px 40px; font-size: 16px;">
                        去结算
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>关于我们</h4>
                    <ul>
                        <li><a href="#">公司简介</a></li>
                        <li><a href="#">联系我们</a></li>
                        <li><a href="#">加入我们</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>帮助中心</h4>
                    <ul>
                        <li><a href="#">购物指南</a></li>
                        <li><a href="#">订单查询</a></li>
                        <li><a href="#">常见问题</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>配送方式</h4>
                    <ul>
                        <li><a href="#">在线交付</a></li>
                        <li><a href="#">使用说明</a></li>
                        <li><a href="#">技术支持</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>关注我们</h4>
                    <ul>
                        <li><a href="#">官方微信</a></li>
                        <li><a href="#">官方微博</a></li>
                        <li><a href="#">客服热线：400-888-8888</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 云商店 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // 页面加载后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
        });
    </script>
</body>
</html>
