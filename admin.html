<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 云商店</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/CWtongxin/CW-electricity-shop@main/style.css">
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
            padding: 20px;
        }
        .admin-sidebar {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .admin-menu-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        .admin-menu-item:hover,
        .admin-menu-item.active {
            background: var(--bg-light);
            color: var(--primary-color);
        }
        .admin-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .data-table th {
            background: var(--bg-light);
            font-weight: 500;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            margin-right: 5px;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-paid { background: #d4edda; color: #155724; }
        .status-unpaid { background: #f8d7da; color: #721c24; }
        .status-shipped { background: #cce5ff; color: #004085; }
        .proof-img {
            max-width: 200px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 登录部分 -->
    <div id="loginSection">
        <div class="modal-overlay active">
            <div class="modal">
                <span class="modal-close" onclick="closeLoginModal()">&times;</span>
                <h2 class="modal-title">管理员登录</h2>
                <form onsubmit="handleAdminLogin(event)">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" value="admin" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" value="win112233" required>
                    </div>
                    <button type="submit" class="submit-btn-full">登录</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 管理后台主界面 -->
    <div id="adminSection" style="display: none;">
        <nav class="navbar">
            <div class="container">
                <div class="navbar-top">
                    <a href="index.html" class="logo">☁️ 云商店后台管理</a>
                    <button class="btn btn-outline" onclick="logout()">退出登录</button>
                </div>
            </div>
        </nav>

        <div class="container section">
            <div class="admin-container">
                <!-- 侧边栏 -->
                <div class="admin-sidebar">
                    <div class="admin-menu-item active" onclick="switchTab('products')">📦 商品管理</div>
                    <div class="admin-menu-item" onclick="switchTab('orders')">📝 订单管理</div>
                    <div class="admin-menu-item" onclick="switchTab('payments')">💰 支付确认</div>
                </div>

                <!-- 内容区 -->
                <div class="admin-content">
                    <!-- 商品管理 -->
                    <div id="productsTab">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                            <h2>商品管理</h2>
                            <button class="btn btn-primary" onclick="showAddProductModal()">+ 添加商品</button>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>名称</th>
                                    <th>价格</th>
                                    <th>库存</th>
                                    <th>销量</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="productListBody"></tbody>
                        </table>
                    </div>

                    <!-- 订单管理 -->
                    <div id="ordersTab" style="display: none;">
                        <h2>订单管理</h2>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>订单号</th>
                                    <th>客户</th>
                                    <th>金额</th>
                                    <th>状态</th>
                                    <th>时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="orderListBody"></tbody>
                        </table>
                    </div>

                    <!-- 支付确认 -->
                    <div id="paymentsTab" style="display: none;">
                        <h2>支付确认</h2>
                        <p style="color: var(--text-secondary); margin-bottom: 20px;">
                            客户上传支付凭证后，请核对银行/支付宝到账情况，然后确认收款
                        </p>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>订单号</th>
                                    <th>金额</th>
                                    <th>凭证</th>
                                    <th>时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="paymentListBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 图片查看弹窗 -->
    <div class="modal-overlay" id="imageModal">
        <div class="modal" style="max-width: 800px;">
            <span class="modal-close" onclick="closeImageModal()">&times;</span>
            <img id="modalImage" src="" style="width: 100%; border-radius: 8px;">
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        // 页面加载检查登录状态
        document.addEventListener('DOMContentLoaded', function() {
            if (UserDAO.isLoggedIn()) {
                showAdminSection();
            }
        });

        // 管理员登录
        async function handleAdminLogin(event) {
            event.preventDefault();
            const form = event.target;
            const username = form.querySelector('input[type="text"]').value;
            const password = form.querySelector('input[type="password"]').value;
            
            try {
                await UserDAO.login(username, password);
                showAdminSection();
            } catch (error) {
                showToast('登录失败：' + error.message);
            }
        }

        // 显示后台界面
        function showAdminSection() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            loadAllProducts();
        }

        // 关闭登录弹窗
        function closeLoginModal() {
            if (!UserDAO.isLoggedIn()) {
                showToast('请登录');
                return;
            }
            document.getElementById('loginSection').classList.remove('active');
        }

        // 加载所有商品
        function loadAllProducts() {
            const products = ProductDAO.getAll();
            const tbody = document.getElementById('productListBody');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>¥${(p.price/100).toFixed(2)}</td>
                    <td>${p.stock}</td>
                    <td>${p.sales}</td>
                    <td>${p.isOnSale ? '<span class="status-badge status-paid">上架</span>' : '<span class="status-badge status-unpaid">下架</span>'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editProduct('${p.id}')">编辑</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 添加商品
        function showAddProductModal() {
            const name = prompt('商品名称：');
            if (!name) return;
            
            const price = parseFloat(prompt('价格（元）：')) * 100;
            const stock = parseInt(prompt('库存数量：'));
            const category = prompt('分类（ecs/storage/database/security/network/bigdata）：');
            const description = prompt('商品描述：') || '新品上市';
            
            ProductDAO.add({
                name,
                price,
                originalPrice: price * 1.5,
                stock,
                category,
                description,
                images: ['https://picsum.photos/400/300?random=' + Date.now()],
                specs: {},
                params: {},
                sales: 0,
                isOnSale: true,
                rating: 5.0,
                reviews: []
            });
            showToast('添加成功');
            loadAllProducts();
        }

        // 编辑商品
        function editProduct(id) {
            const product = ProductDAO.getById(id);
            if (!product) return;
            
            const newName = prompt('商品名称：', product.name);
            if (!newName) return;
            
            const newPrice = parseFloat(prompt('价格（元）：', product.price/100)) * 100;
            const newStock = parseInt(prompt('库存数量：', product.stock));
            
            ProductDAO.update(id, {
                name: newName,
                price: newPrice,
                stock: newStock
            });
            
            showToast('更新成功');
            loadAllProducts();
        }

        // 删除商品
        function deleteProduct(id) {
            if (!confirm('确定删除该商品吗？')) return;
            ProductDAO.delete(id);
            showToast('删除成功');
            loadAllProducts();
        }

        // 切换 Tab
        function switchTab(tabName) {
            ['products', 'orders', 'payments'].forEach(name => {
                document.getElementById(name + 'Tab').style.display = 
                    name === tabName ? 'block' : 'none';
            });
            
            document.querySelectorAll('.admin-menu-item').forEach((item, index) => {
                item.classList.toggle('active', 
                    (tabName === 'products' && index === 0) ||
                    (tabName === 'orders' && index === 1) ||
                    (tabName === 'payments' && index === 2)
                );
            });

            // 加载对应数据
            if (tabName === 'orders') loadAllOrders();
            if (tabName === 'payments') loadPendingPayments();
        }

        // 加载所有订单
        function loadAllOrders() {
            const orders = OrderDAO.getAll();
            const tbody = document.getElementById('orderListBody');
            tbody.innerHTML = orders.map(o => `
                <tr>
                    <td>${o.orderNo}</td>
                    <td>${o.customerName}<br><small style="color: var(--text-light)">${o.customerPhone}</small></td>
                    <td>¥${(o.totalAmount/100).toFixed(2)}</td>
                    <td><span class="status-badge ${getStatusClass(o.status)}">${getStatusText(o.status)}</span></td>
                    <td>${formatTime(o.createTime)}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="viewOrderDetail('${o.orderNo}')">详情</button>
                        ${o.status === 'paid' ? `<button class="btn btn-sm btn-success" onclick="shipOrder('${o.orderNo}')">发货</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        // 获取状态样式
        function getStatusClass(status) {
            const map = {
                'pending': 'status-unpaid',
                'paid': 'status-paid',
                'shipped': 'status-shipped',
                'completed': 'status-paid'
            };
            return map[status] || 'status-unpaid';
        }

        // 获取状态文本
        function getStatusText(status) {
            const map = {
                'pending': '待付款',
                'paid': '已付款',
                'shipped': '已发货',
                'completed': '已完成'
            };
            return map[status] || status;
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
        }

        // 加载待确认支付订单
        function loadPendingPayments() {
            const orders = OrderDAO.getPendingPayments();
            const tbody = document.getElementById('paymentListBody');
            
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--text-light);">暂无待确认的支付</td></tr>';
                return;
            }
            
            tbody.innerHTML = orders.map(o => `
                <tr>
                    <td>${o.orderNo}</td>
                    <td>¥${(o.totalAmount/100).toFixed(2)}</td>
                    <td><img src="${o.paymentProof}" class="proof-img" onclick="viewImage('${o.paymentProof}')"></td>
                    <td>${formatTime(o.paidTime)}</td>
                    <td>
                        <button class="btn btn-sm btn-success" onclick="confirmPayment('${o.orderNo}')">确认收款</button>
                    </td>
                </tr>
            `).join('');
        }

        // 查看订单详情
        function viewOrderDetail(orderNo) {
            const order = OrderDAO.getByOrderNo(orderNo);
            if (!order) return;
            
            const itemsHtml = order.items.map(item => 
                `<div>${item.name} x${item.quantity} - ¥${(item.price/100).toFixed(2)}</div>`
            ).join('');
            
            alert(`订单号：${orderNo}
客户：${order.customerName}
电话：${order.customerPhone}
地址：${order.address}

商品：
${itemsHtml}

总金额：¥${(order.totalAmount/100).toFixed(2)}`);
        }

        // 查看大图
        function viewImage(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('active');
        }

        // 关闭图片弹窗
        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        // 确认收款
        function confirmPayment(orderNo) {
            if (!confirm('确认已收到款项吗？')) return;
            OrderDAO.confirmPayment(orderNo);
            showToast('已确认收款');
            loadPendingPayments();
            loadAllOrders();
        }

        // 发货
        function shipOrder(orderNo) {
            const company = prompt('快递公司：');
            if (!company) return;
            
            const trackingNo = prompt('快递单号：');
            if (!trackingNo) return;
            
            OrderDAO.ship(orderNo, company, trackingNo);
            showToast('已发货');
            loadAllOrders();
        }

        // 退出登录
        function logout() {
            UserDAO.logout();
            location.reload();
        }
    </script>
</body>
</html>
