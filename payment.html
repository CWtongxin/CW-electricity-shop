<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付订单 - 云商店</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/CWtongxin/CW-electricity-shop@main/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-top">
                <a href="index.html" class="logo">
                    <span class="logo-icon">☁️</span>
                    <span>云商店</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container section">
        <h2 class="section-title">💳 支付订单</h2>
        
        <div class="checkout-section">
            <h3>订单信息</h3>
            <div id="orderInfo" style="padding: 20px; background: var(--bg-light); border-radius: 8px;">
                加载中...
            </div>
        </div>

        <div class="checkout-section">
            <h3>支付方式</h3>
            <div style="text-align: center; padding: 30px;">
                <div style="font-size: 60px; margin-bottom: 20px;">📱</div>
                <h3 style="margin-bottom: 15px;">请使用支付宝/微信扫描支付</h3>
                <div style="display: inline-block; padding: 20px; background: white; border: 2px solid var(--primary-color); border-radius: 8px;">
                    <img src="https://picsum.photos/200/200?random=99" alt="支付二维码" style="width: 200px; height: 200px;">
                </div>
                <p style="color: var(--text-secondary); margin-top: 20px; font-size: 14px;">
                    支付完成后，请截图支付成功页面并上传下方
                </p>
            </div>
        </div>

        <div class="checkout-section">
            <h3>上传支付凭证</h3>
            <div class="form-group">
                <label class="form-label">选择截图文件</label>
                <input type="file" id="proofFile" accept="image/*" class="form-input">
                <small style="color: var(--text-light);">支持 JPG、PNG 格式，文件大小不超过 5MB</small>
            </div>
            <div id="previewContainer" style="margin: 15px 0;"></div>
            <button class="btn btn-primary" onclick="uploadProof()">上传凭证并提交</button>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 云商店 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        let currentOrderNo = null;

        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentOrderNo = urlParams.get('orderNo');
            
            if (!currentOrderNo) {
                showToast('订单号不存在');
                setTimeout(() => location.href = 'index.html', 2000);
                return;
            }

            // 加载订单信息
            try {
                const order = OrderDAO.getByOrderNo(currentOrderNo);
                if (!order) {
                    showToast('订单不存在');
                    return;
                }

                document.getElementById('orderInfo').innerHTML = `
                    <p><strong>订单号：</strong>${order.orderNo}</p>
                    <p><strong>金额：</strong>¥${(order.totalAmount/100).toFixed(2)}</p>
                    <p><strong>收货地址：</strong>${order.address}</p>
                    <p><strong>客户姓名：</strong>${order.customerName}</p>
                    <p><strong>联系电话：</strong>${order.customerPhone}</p>
                `;
            } catch (error) {
                console.error('加载订单失败:', error);
                showToast('加载失败');
            }
        });

        // 图片预览
        document.getElementById('proofFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewContainer').innerHTML = `
                    <img src="${e.target.result}" style="max-width: 300px; border-radius: 8px; border: 2px solid var(--primary-color);">
                `;
            };
            reader.readAsDataURL(file);
        });

        // 上传凭证
        async function uploadProof() {
            const fileInput = document.getElementById('proofFile');
            if (!fileInput.files[0]) {
                showToast('请选择支付截图');
                return;
            }

            try {
                // 读取文件
                const proofData = await FileDAO.upload(fileInput);
                
                // 更新订单
                OrderDAO.uploadPaymentProof(currentOrderNo, proofData);
                
                showToast('支付凭证上传成功！等待管理员确认', 3000);
                
                setTimeout(() => {
                    location.href = 'index.html';
                }, 2000);
            } catch (error) {
                showToast('上传失败：' + error.message);
            }
        }
    </script>
</body>
</html>
